<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla del 3</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>

<body>

    <div class="contenedor" id="divContenedor">

        <h2>📚 Generador de Tablas de Multiplicar</h2>

        <p class="descripcion">
            Escriba un número y presione el botón <strong>PROBAR</strong> para visualizar su tabla de multiplicar del 1
            al 12.
        </p>

        <button class="btn-probar" onclick="generarTablas()">
            PROBAR
        </button>

        <input type="number" id="txtNumero" class="caja-texto" placeholder="Ejemplo: 8">

        <small class="ayuda">
            💡 Puede ingresar cualquier número entero y presione el botón  <strong>PROBAR</strong>.
        </small>    

        <div class="tabla" id="resultado">

            <div class="titulo-tabla">
                <span>🧮</span>
                <h1>Tabla de multiplicar</h1>
            </div>

        </div>

        <footer>
            <p>Desarrollado por <strong>Mishell Yanez</strong></p>
        </footer>

    </div>

</body>

</html>
